name: QuestionPro Daily ETL

on:
  schedule:
    # Roda todos os dias às 06:00 AM (UTC)
    - cron: '0 6 * * *'
  workflow_dispatch: # Permite rodar manualmente clicando em um botão

jobs:
  run-etl:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install ODBC Drivers
      run: sudo apt-get install -y unixodbc-dev
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run ETL Script
      env:
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_SERVER: ${{ secrets.DB_SERVER }}
        DB_NAME: ${{ secrets.DB_NAME }}
        API_KEY: ${{ secrets.API_KEY }}
        SURVEY_ID: ${{ secrets.SURVEY_ID }}
      run: python etl_questionpro.py